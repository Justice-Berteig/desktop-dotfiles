$configDir = ~/.config/hypr

# Load variables for use in the rest of the config
# MUST BE LOADED BEFORE OTHER CONFIG FILES
source = $configDir/variables.conf

# Load all other config files
source = $configDir/env.conf
source = $configDir/input.conf
source = $configDir/keybinds.conf
source = $configDir/monitors.conf
source = $configDir/startup.conf
source = $configDir/style.conf
source = $configDir/window_rules.conf


# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                      Configure Variables                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

input:touchpad:disable_while_typing = false
input:touchpad:scroll_factor = 0.8

misc:initial_workspace_tracking = 2
misc:middle_click_paste = false
